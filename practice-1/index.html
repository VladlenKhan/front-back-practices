<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Практика 1 — CSS-препроцессоры</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="product-card">
        <img src="https://picsum.photos/id/1015/400/300" alt="MacBook Pro">
        
        <div class="product-card__content">
            <h2 class="product-card__title">MacBook Pro 16"</h2>
            <p class="product-card__description">
                Мощный ноутбук с чипом M3 Pro. Идеален для разработчиков и дизайнеров.
            </p>
            
            <div class="product-card__price">189 990 ₽</div>
            
            <button class="product-card__button">Добавить в корзину</button>
        </div>
    </div>

</body>
</html>
